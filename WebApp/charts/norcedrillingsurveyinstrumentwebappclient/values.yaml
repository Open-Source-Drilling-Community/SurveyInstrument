# Default values for norcedrillingsurveyinstrumentwebappclient.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
replicaCount: 1
image:
  repository: digiwells/norcedrillingsurveyinstrumentwebappclient
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "stable"
imagePullSecrets: []
nameOverride: "norcedrillingsurveyinstrumentwebappclient"
fullnameOverride: "norcedrillingsurveyinstrumentwebappclient"
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""
podAnnotations: {}
podSecurityContext: {}
  # fsGroup: 2000
securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000
service:
  type: ClusterIP
  port: 80
ingress:
  enabled: true
  className: public
  annotations:
    # nginx-ingress: Enable case-insensitive path matching
    # This allows requests like /SurveyInstrument/webapp to match /surveyinstrument/webapp
    nginx.ingress.kubernetes.io/server-snippet: |
      location ~* ^/([a-zA-Z0-9]+)/(api|webapp)(/|$) {
        set  ;
        set  ;
        set  ;
        rewrite ^/(.*)$ // break;
      }
  hosts:
    - host: localhost
      paths:
        - path: /surveyinstrument/webapp
          pathType: Prefix
    - host: dev.digiwells.no
      paths:
        - path: /surveyinstrument/webapp
          pathType: Prefix
    - host: app.digiwells.no
      paths:
        - path: /surveyinstrument/webapp
          pathType: Prefix
    - host: awe.web.intra.norceresearch.no
      paths:
        - path: /surveyinstrument/webapp
          pathType: Prefix
resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80
nodeSelector: {}
tolerations: []
affinity: {}
probes:
  enabled: false
